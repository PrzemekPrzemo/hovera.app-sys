server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Coolify's own proxy (Traefik) terminates TLS and forwards plain HTTP
    # here with X-Forwarded-* headers — matched by bootstrap/app.php's
    # trustProxies() config so Laravel still sees the request as HTTPS.
    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        # `fastcgi_pass php:9000` as a bare literal resolves the "php"
        # hostname ONCE, at nginx startup — if the php container is
        # crash-looping (e.g. missing required env like APP_KEY) and
        # happens to be down at that instant, nginx fails permanently
        # with "host not found in upstream" and never recovers on its
        # own. Routing through a variable forces per-request resolution
        # via Docker's embedded DNS (127.0.0.11), so nginx always starts
        # and just 502s until php comes back, instead of dying with it.
        resolver 127.0.0.11 valid=10s;
        set $php_upstream php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_param HTTPS on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        access_log off;
    }
}
