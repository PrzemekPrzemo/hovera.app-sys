name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_mysql, pdo_sqlite, redis, gd, bcmath, fileinfo
          coverage: none
          tools: composer:v2

      - name: Prepare environment
        run: cp .env.example .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      # --no-scripts: post-install hooks (artisan filament:upgrade, etc.)
      # need an APP_KEY which we set in the next step.
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Generate APP_KEY
        run: php artisan key:generate --no-interaction

      - name: Discover packages
        run: php artisan package:discover --no-interaction --ansi

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --testdox

  pint:
    name: Laravel Pint (style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.3-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run Laravel Pint (check only)
        run: ./vendor/bin/pint --test
