name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# This workflow assumes the runner has a recent PHP (>= 8.2) and Composer
# 2.x already on PATH. We don't use shivammathur/setup-php because it
# requires reaching the sury PPA / Packagist with elevated privileges,
# which isn't available in our sandboxed CI runner.

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          which php composer
          php -v
          composer --version
          php -m | tr '\n' ' '
          echo

      - name: Prepare environment
        run: cp .env.example .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # --no-scripts: post-install hooks (artisan filament:upgrade, etc.)
      # need an APP_KEY which we generate in the next step.
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Generate APP_KEY
        run: php artisan key:generate --no-interaction

      - name: Discover packages
        run: php artisan package:discover --no-interaction --ansi

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --testdox

  pint:
    name: Laravel Pint (style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          which php composer
          php -v
          composer --version

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run Laravel Pint (check only)
        run: ./vendor/bin/pint --test
